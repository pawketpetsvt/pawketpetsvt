<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self' 'unsafe-inline' 'unsafe-eval' https: data: blob:; connect-src 'self' https://hqzugbxutgefjilgmxqu.supabase.co https://*.supabase.co data: blob:;">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PawketPetsVT — Register</title>
  <link rel="stylesheet" href="css/style.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase.js"></script>
</head>
<body>

  <!-- ── Navigation ── -->
  <nav class="navbar">
    <div class="navbar-inner">
      <a href="index.html" class="navbar-logo">🐾 <span>Pawket</span>PetsVT</a>
      <div class="navbar-links">
        <a href="index.html">🏠 Home</a>
        <a href="adopt.html">🐣 Adopt</a>
        <a href="news.html">📰 News</a>
      </div>
      <div class="navbar-user">
        <a href="login.html" id="nav-login" class="btn-nav-login">Login</a>
        <button onclick="logoutUser()" id="nav-logout" class="btn-nav-logout" style="display:none">Logout</button>
      </div>
    </div>
  </nav>

  <div class="page-wrap">
    <div class="page-hero">
      <div class="sparkle-row">✦ ✧ ✦</div>
      <h1>Join PawketPetsVT!</h1>
      <p>Create your account and start your pet collection adventure ✨</p>
    </div>

    <div class="form-card">
      <h2>🌟 Register</h2>
      <p class="form-subtitle">Already have an account? <a href="login.html">Login here!</a></p>

      <div class="alert alert-error" id="reg-error"></div>
      <div class="alert alert-success" id="reg-success"></div>

      <div class="form-group">
        <label for="username">Username</label>
        <input type="text" id="username" placeholder="CoolPetTrainer123" autocomplete="username" maxlength="30" />
      </div>

      <div class="form-group">
        <label for="email">Email Address</label>
        <input type="email" id="email" placeholder="your@email.com" autocomplete="email" />
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="At least 6 characters" autocomplete="new-password" />
      </div>

      <div class="form-group">
        <label for="confirm-password">Confirm Password</label>
        <input type="password" id="confirm-password" placeholder="••••••••" autocomplete="new-password" />
      </div>

      <button class="btn btn-primary btn-lg form-submit" id="reg-btn" onclick="handleRegister()">
        🌟 Create Account
      </button>

      <div class="form-footer">
        Already have an account? <a href="login.html">Login!</a>
      </div>
    </div>
  </div>

  <footer class="footer">
    <div class="footer-sparkles">✦ ✧ ★ ✦ ✧ ★ ✦</div>
    <p>© 2024 PawketPetsVT &nbsp;|&nbsp; Made with 💖</p>
  </footer>

  <script src="js/auth.js"></script>
  <script>
    redirectIfLoggedIn();

    async function handleRegister() {
      const username = document.getElementById('username').value.trim();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const confirm = document.getElementById('confirm-password').value;
      const btn = document.getElementById('reg-btn');
      const errorEl = document.getElementById('reg-error');
      const successEl = document.getElementById('reg-success');

      errorEl.classList.remove('show');
      successEl.classList.remove('show');

      // Validation
      if (!username || !email || !password || !confirm) {
        errorEl.textContent = 'Please fill in all fields!';
        errorEl.classList.add('show');
        return;
      }
      if (username.length < 3) {
        errorEl.textContent = 'Username must be at least 3 characters!';
        errorEl.classList.add('show');
        return;
      }
      if (password.length < 6) {
        errorEl.textContent = 'Password must be at least 6 characters!';
        errorEl.classList.add('show');
        return;
      }
      if (password !== confirm) {
        errorEl.textContent = 'Passwords do not match!';
        errorEl.classList.add('show');
        return;
      }

      btn.textContent = '🌟 Creating account...';
      btn.disabled = true;

      try {
        await registerUser(email, password, username);
        successEl.innerHTML = `
          Account created! 🎉<br>
          <small>Check your email to confirm your account, then <a href="login.html">login here</a>!</small>
        `;
        successEl.classList.add('show');
        btn.textContent = '✅ Account Created!';
      } catch (err) {
        errorEl.textContent = err.message || 'Registration failed. Please try again.';
        errorEl.classList.add('show');
        btn.textContent = '🌟 Create Account';
        btn.disabled = false;
      }
    }

    document.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') handleRegister();
    });
  </script>

</body>
</html>
