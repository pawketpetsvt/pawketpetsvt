<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self' 'unsafe-inline' 'unsafe-eval' https: data: blob:; connect-src 'self' https://hqzugbxutgefjilgmxqu.supabase.co https://*.supabase.co data: blob:;">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PawketPetsVT — Login</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="page-wrap">
    <div class="page-hero">
      <div class="sparkle-row">✦ ✧ ✦</div>
      <h1>Welcome Back!</h1>
      <p>Login to check on your pets and keep the adventure going ✨</p>
    </div>
    <div class="form-card">
      <h2>🐾 Login</h2>
      <p class="form-subtitle">Don't have an account? <a href="register.html">Register here!</a></p>
      <div class="alert alert-error" id="login-error"></div>
      <div class="alert alert-success" id="login-success"></div>
      <div class="form-group"><label>Email Address</label><input type="email" id="email" placeholder="your@email.com" autocomplete="email" /></div>
      <div class="form-group"><label>Password</label><input type="password" id="password" placeholder="••••••••" autocomplete="current-password" /></div>
      <button class="btn btn-primary btn-lg form-submit" id="login-btn" onclick="handleLogin()">✨ Login</button>
      <div class="form-footer">New here? <a href="register.html">Create an account!</a></div>
    </div>
  </div>
  <footer class="footer"><div class="footer-sparkles">✦ ✧ ★ ✦ ✧ ★ ✦</div><p>© 2025 PawketPetsVT &nbsp;|&nbsp; Made with 💖</p></footer>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/shared.js"></script>
  <script>
    injectShared('');
    redirectIfLoggedIn();
    async function handleLogin() {
      var email = document.getElementById('email').value.trim();
      var password = document.getElementById('password').value;
      var btn = document.getElementById('login-btn');
      var errorEl = document.getElementById('login-error');
      var successEl = document.getElementById('login-success');
      errorEl.classList.remove('show'); successEl.classList.remove('show');
      if (!email || !password) { errorEl.textContent = 'Please fill in all fields!'; errorEl.classList.add('show'); return; }
      btn.textContent = '✨ Logging in...'; btn.disabled = true;
      try {
        await loginUser(email, password);
        successEl.textContent = 'Logged in! Redirecting... 🎉'; successEl.classList.add('show');
        setTimeout(function() { window.location.href = 'index.html'; }, 1000);
      } catch(err) {
        errorEl.textContent = err.message || 'Login failed.'; errorEl.classList.add('show');
        btn.textContent = '✨ Login'; btn.disabled = false;
      }
    }
    document.addEventListener('keydown', function(e) { if (e.key === 'Enter') handleLogin(); });
  </script>
</body>
</html>
