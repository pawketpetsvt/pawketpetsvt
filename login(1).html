<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self' 'unsafe-inline' 'unsafe-eval' https: data: blob:; connect-src 'self' https://hqzugbxutgefjilgmxqu.supabase.co https://*.supabase.co data: blob:;">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PawketPetsVT — Login</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <!-- ── Navigation ── -->
  <nav class="navbar">
    <div class="navbar-inner">
      <a href="index.html" class="navbar-logo">🐾 <span>Pawket</span>PetsVT</a>
      <div class="navbar-links">
        <a href="index.html">🏠 Home</a>
        <a href="adopt.html">🐣 Adopt</a>
        <a href="news.html">📰 News</a>
      </div>
      <div class="navbar-user">
        <a href="login.html" id="nav-login" class="btn-nav-login">Login</a>
        <button onclick="logoutUser()" id="nav-logout" class="btn-nav-logout" style="display:none">Logout</button>
      </div>
    </div>
  </nav>

  <div class="page-wrap">
    <div class="page-hero">
      <div class="sparkle-row">✦ ✧ ✦</div>
      <h1>Welcome Back!</h1>
      <p>Login to check on your pets and keep the adventure going ✨</p>
    </div>

    <div class="form-card">
      <h2>🐾 Login</h2>
      <p class="form-subtitle">Don't have an account? <a href="register.html">Register here!</a></p>

      <div class="alert alert-error" id="login-error"></div>
      <div class="alert alert-success" id="login-success"></div>

      <div class="form-group">
        <label for="email">Email Address</label>
        <input type="email" id="email" placeholder="your@email.com" autocomplete="email" />
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" />
      </div>

      <button class="btn btn-primary btn-lg form-submit" id="login-btn" onclick="handleLogin()">
        ✨ Login
      </button>

      <div class="form-footer">
        New here? <a href="register.html">Create an account!</a>
      </div>
    </div>
  </div>

  <footer class="footer">
    <div class="footer-sparkles">✦ ✧ ★ ✦ ✧ ★ ✦</div>
    <p>© 2024 PawketPetsVT &nbsp;|&nbsp; Made with 💖</p>
  </footer>

  <!-- ── Scripts load at bottom in correct order ── -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase.js"></script>
  <script src="js/auth.js"></script>
  <script>
    redirectIfLoggedIn();

    async function handleLogin() {
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const btn = document.getElementById('login-btn');
      const errorEl = document.getElementById('login-error');
      const successEl = document.getElementById('login-success');

      errorEl.classList.remove('show');
      successEl.classList.remove('show');

      if (!email || !password) {
        errorEl.textContent = 'Please fill in all fields!';
        errorEl.classList.add('show');
        return;
      }

      btn.textContent = '✨ Logging in...';
      btn.disabled = true;

      try {
        await loginUser(email, password);
        successEl.textContent = 'Logged in! Redirecting... 🎉';
        successEl.classList.add('show');
        setTimeout(() => window.location.href = 'index.html', 1000);
      } catch (err) {
        errorEl.textContent = err.message || 'Login failed. Please try again.';
        errorEl.classList.add('show');
        btn.textContent = '✨ Login';
        btn.disabled = false;
      }
    }

    document.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') handleLogin();
    });
  </script>

</body>
</html>
