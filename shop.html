<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self' 'unsafe-inline' 'unsafe-eval' https: data: blob:; connect-src 'self' https://hqzugbxutgefjilgmxqu.supabase.co https://*.supabase.co data: blob:;">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PawketPetsVT — Shop</title>
  <link rel="stylesheet" href="css/style.css" />
  <style>
    .shop-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 20px; margin-top: 24px; }
    .shop-card { background: var(--white); border: 2.5px solid var(--border); border-radius: var(--radius-lg); padding: 20px; text-align: center; box-shadow: 0 4px 16px var(--shadow); transition: transform 0.2s; display: flex; flex-direction: column; gap: 10px; align-items: center; }
    .shop-card:hover { transform: translateY(-4px); }
    .shop-item-icon { width: 90px; height: 90px; border-radius: var(--radius); background: var(--purple-light); display: flex; align-items: center; justify-content: center; font-size: 2.8rem; overflow: hidden; }
    .shop-item-icon img { width: 100%; height: 100%; object-fit: cover; }
    .shop-item-name { font-family: 'Fredoka One', cursive; font-size: 1.1rem; color: var(--purple-dark); }
    .shop-item-desc { font-size: 0.85rem; color: var(--text-light); line-height: 1.5; flex: 1; }
    .shop-effects { display: flex; flex-wrap: wrap; gap: 4px; justify-content: center; }
    .effect-tag { font-size: 0.78rem; font-weight: 700; color: var(--purple); background: var(--purple-light); padding: 2px 8px; border-radius: 20px; }
    .shop-item-price { font-family: 'Fredoka One', cursive; font-size: 1.1rem; color: var(--purple); }
    .btn-buy { width: 100%; font-family: 'Fredoka One', cursive; font-size: 0.95rem; padding: 9px; border-radius: 24px; border: none; cursor: pointer; background: linear-gradient(135deg, var(--purple), var(--pink)); color: var(--white); transition: transform 0.15s, opacity 0.2s; }
    .btn-buy:hover:not(:disabled) { transform: translateY(-2px); }
    .btn-buy:disabled { opacity: 0.4; cursor: not-allowed; }
    .shop-tabs { display: flex; gap: 8px; margin-bottom: 4px; }
    .shop-tab { font-family: 'Fredoka One', cursive; font-size: 0.95rem; padding: 8px 20px; border-radius: 24px; border: 2.5px solid var(--border); background: var(--white); color: var(--text-light); cursor: pointer; transition: all 0.2s; }
    .shop-tab.active { background: linear-gradient(135deg, var(--purple), var(--pink)); color: var(--white); border-color: transparent; }
    .inventory-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 16px; margin-top: 20px; }
    .inv-card { background: var(--white); border: 2.5px solid var(--border); border-radius: var(--radius-lg); padding: 16px; text-align: center; box-shadow: 0 4px 12px var(--shadow); display: flex; flex-direction: column; gap: 8px; align-items: center; }
    .inv-icon { width: 60px; height: 60px; border-radius: var(--radius); background: var(--purple-light); display: flex; align-items: center; justify-content: center; font-size: 2rem; overflow: hidden; }
    .inv-icon img { width: 100%; height: 100%; object-fit: cover; }
    .inv-name { font-family: 'Fredoka One', cursive; font-size: 0.95rem; color: var(--purple-dark); }
    .inv-qty { font-size: 0.8rem; font-weight: 700; color: var(--text-light); }
    .use-modal-overlay { display: none; position: fixed; inset: 0; background: rgba(60,20,100,0.5); backdrop-filter: blur(4px); z-index: 200; align-items: center; justify-content: center; }
    .use-modal-overlay.show { display: flex; }
    .use-modal { background: var(--white); border: 2.5px solid var(--border); border-radius: var(--radius-lg); padding: 32px; max-width: 380px; width: 90%; text-align: center; box-shadow: 0 20px 60px rgba(60,20,100,0.3); animation: modal-pop 0.2s ease-out; }
    @keyframes modal-pop { from { transform: scale(0.85); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    .use-modal h2 { font-size: 1.6rem; color: var(--purple-dark); margin-bottom: 8px; }
    .use-modal p { color: var(--text-light); margin-bottom: 16px; }
    .pet-select-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 20px; max-height: 220px; overflow-y: auto; }
    .pet-select-btn { font-family: 'Fredoka One', cursive; font-size: 0.95rem; padding: 10px 16px; border-radius: 16px; border: 2.5px solid var(--border); background: var(--cream); color: var(--text); cursor: pointer; transition: all 0.2s; text-align: left; }
    .pet-select-btn:hover { border-color: var(--purple); background: var(--purple-light); }
  </style>
</head>
<body>
  <div class="page-wrap">
    <div class="page-hero">
      <div class="sparkle-row">🛍️ ✦ 🛍️</div>
      <h1>The PawketShop</h1>
      <p>Spend your PawketPoints on treats, toys, and goodies! 🪙</p>
    </div>
    <div class="points-banner">
      <span class="pb-label">🪙 Your PawketPoints</span>
      <span class="pb-amount" id="points-display">0 PP</span>
    </div>
    <div class="shop-tabs">
      <button class="shop-tab active" id="tab-shop-btn" onclick="showTab('shop')">🛍️ Shop</button>
      <button class="shop-tab" id="tab-inv-btn" onclick="showTab('inventory')">🎒 My Inventory</button>
    </div>
    <div id="tab-shop"><div id="shop-grid" class="shop-grid"><div class="spinner"></div></div></div>
    <div id="tab-inventory" style="display:none"><div id="inventory-grid" class="inventory-grid"><div class="spinner"></div></div></div>
  </div>

  <div class="use-modal-overlay" id="use-modal">
    <div class="use-modal">
      <h2 id="use-modal-title">Use item</h2>
      <p id="use-modal-desc">Which pet?</p>
      <div class="pet-select-list" id="pet-select-list"></div>
      <button class="btn btn-outline" onclick="closeUseModal()">Cancel</button>
    </div>
  </div>

  <footer class="footer"><div class="footer-sparkles">✦ ✧ ★ ✦ ✧ ★ ✦</div><p>© 2025 PawketPetsVT &nbsp;|&nbsp; Made with 💖</p></footer>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/shared.js"></script>
  <script>
    injectShared('shop');
    var currentUser = null, currentPoints = 0, myPets = [], selectedInvItem = null;

    async function init() {
      var session = await requireLogin(); if (!session) return;
      await updateNav(); currentUser = session.user;
      var pr = await supabaseClient.from('players').select('pawketpoints').eq('id', currentUser.id).single();
      if (pr.data) { currentPoints = pr.data.pawketpoints; updatePointsDisplay(); }
      var pets = await supabaseClient.from('user_pets').select('id, nickname').eq('user_id', currentUser.id);
      if (pets.data) myPets = pets.data;
      await loadShop();
      await loadInventory();
    }

    function updatePointsDisplay() {
      var el = document.getElementById('points-display'); if (el) el.textContent = currentPoints + ' PP';
      var nav = document.getElementById('nav-points'); if (nav) nav.textContent = '🪙 ' + currentPoints + ' PP';
    }

    function showTab(tab) {
      document.getElementById('tab-shop').style.display = tab === 'shop' ? 'block' : 'none';
      document.getElementById('tab-inventory').style.display = tab === 'inventory' ? 'block' : 'none';
      document.getElementById('tab-shop-btn').classList.toggle('active', tab === 'shop');
      document.getElementById('tab-inv-btn').classList.toggle('active', tab === 'inventory');
    }

    function emoji(type) { return {food:'🍖',toy:'🎾',potion:'✨',special:'🌟'}[type] || '🎁'; }

    function effectTags(item) {
      var tags = [];
      if (item.hunger_effect > 0) tags.push('<span class="effect-tag">🍖 +' + item.hunger_effect + ' Hunger</span>');
      if (item.energy_effect > 0) tags.push('<span class="effect-tag">⚡ +' + item.energy_effect + ' Energy</span>');
      if (item.happiness_effect > 0) tags.push('<span class="effect-tag">💖 +' + item.happiness_effect + ' Happiness</span>');
      if (item.xp_effect > 0) tags.push('<span class="effect-tag">✨ +' + item.xp_effect + ' XP</span>');
      return tags.length ? '<div class="shop-effects">' + tags.join('') + '</div>' : '';
    }

    async function loadShop() {
      var grid = document.getElementById('shop-grid');
      var res = await supabaseClient.from('items').select('*').order('price', {ascending:true});
      if (res.error || !res.data || !res.data.length) { grid.innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:40px;color:var(--text-light)">No items yet! Check back soon.</div>'; return; }

      // Deduplicate by name — keep lowest price version
      var seen = {}, deduped = [];
      res.data.forEach(function(item) {
        var key = item.name.toLowerCase().trim();
        if (!seen[key] || item.price < seen[key].price) { seen[key] = item; }
      });
      Object.values(seen).forEach(function(item) { deduped.push(item); });
      deduped.sort(function(a,b){ return a.price - b.price; });

      grid.innerHTML = deduped.map(function(item) {
        var em = emoji(item.item_type);
        var canAfford = currentPoints >= item.price;
        var imgHtml = item.image_url ? '<img src="' + item.image_url + '" alt="' + item.name + '" onerror="this.parentElement.innerHTML=\'' + em + '\'">' : em;
        return '<div class="shop-card">' +
          '<div class="shop-item-icon">' + imgHtml + '</div>' +
          '<div class="shop-item-name">' + item.name + '</div>' +
          '<div class="shop-item-desc">' + (item.description || '') + '</div>' +
          effectTags(item) +
          '<div class="shop-item-price">🪙 ' + item.price + ' PP</div>' +
          '<button class="btn-buy" onclick="buy(\'' + item.id + '\',\'' + item.name.replace(/'/g,"\\'") + '\',' + item.price + ')" ' + (!canAfford ? 'disabled' : '') + '>' +
          (canAfford ? '🛍️ Buy' : 'Need ' + item.price + ' PP') + '</button></div>';
      }).join('');
    }

    async function buy(itemId, itemName, price) {
      if (currentPoints < price) return;
      var np = currentPoints - price;
      var res1 = await supabaseClient.from('players').update({pawketpoints:np}).eq('id', currentUser.id);
      if (res1.error) { showToast('Error deducting points.'); return; }

      var existing = await supabaseClient.from('user_inventory').select('id, quantity').eq('user_id', currentUser.id).eq('item_id', itemId).limit(1);
      if (existing.data && existing.data.length > 0) {
        await supabaseClient.from('user_inventory').update({quantity: existing.data[0].quantity + 1}).eq('id', existing.data[0].id);
      } else {
        var ins = await supabaseClient.from('user_inventory').insert([{user_id:currentUser.id, item_id:itemId, quantity:1}]);
        if (ins.error) { showToast('Bought but inventory failed: ' + ins.error.message); return; }
      }
      currentPoints = np; updatePointsDisplay();
      showToast('✨ Bought ' + itemName + '! Check your inventory.');
      await loadShop(); await loadInventory();
    }

    async function loadInventory() {
      var grid = document.getElementById('inventory-grid');
      var invRes = await supabaseClient.from('user_inventory').select('id, item_id, quantity').eq('user_id', currentUser.id).gt('quantity', 0);
      if (invRes.error || !invRes.data || !invRes.data.length) { grid.innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:40px;color:var(--text-light)">Inventory empty! Buy items from the shop. 🛍️</div>'; return; }
      var itemIds = invRes.data.map(function(r){return r.item_id;});
      var itemsRes = await supabaseClient.from('items').select('id, name, item_type, image_url').in('id', itemIds);
      var itemMap = {};
      if (itemsRes.data) itemsRes.data.forEach(function(i){ itemMap[i.id] = i; });
      grid.innerHTML = invRes.data.map(function(row) {
        var item = itemMap[row.item_id] || {};
        var em = emoji(item.item_type);
        var imgHtml = item.image_url ? '<img src="' + item.image_url + '" alt="' + (item.name||'') + '" onerror="this.parentElement.innerHTML=\'' + em + '\'" style="width:100%;height:100%;object-fit:cover;">' : em;
        return '<div class="inv-card"><div class="inv-icon">' + imgHtml + '</div>' +
          '<div class="inv-name">' + (item.name||'Item') + '</div>' +
          '<div class="inv-qty">x' + row.quantity + '</div>' +
          '<button class="btn btn-sm btn-primary" onclick="openUseModal(\'' + row.id + '\',\'' + (item.name||'').replace(/'/g,"\\'") + '\')">✨ Use</button></div>';
      }).join('');
    }

    function openUseModal(invId, itemName) {
      selectedInvItem = { invId: invId, itemName: itemName };
      document.getElementById('use-modal-title').textContent = 'Use ' + itemName;
      document.getElementById('use-modal-desc').textContent = 'Which pet would you like to give this to?';
      var list = document.getElementById('pet-select-list');
      if (!myPets.length) { list.innerHTML = '<p style="color:var(--text-light)">No pets yet! <a href="adopt.html">Adopt one</a>.</p>'; }
      else { list.innerHTML = myPets.map(function(p){ return '<button class="pet-select-btn" onclick="useOnPet(\'' + p.id + '\',\'' + p.nickname.replace(/'/g,"\\'") + '\')">🐾 ' + p.nickname + '</button>'; }).join(''); }
      document.getElementById('use-modal').classList.add('show');
    }

    function closeUseModal() { document.getElementById('use-modal').classList.remove('show'); selectedInvItem = null; }

    async function useOnPet(petId, petNickname) {
      if (!selectedInvItem) return;
      var invId = selectedInvItem.invId; var itemName = selectedInvItem.itemName;
      closeUseModal();

      // Get item effects
      var invRow = await supabaseClient.from('user_inventory').select('item_id, quantity').eq('id', invId).single();
      if (invRow.error || !invRow.data) { showToast('Could not find item.'); return; }
      var itemRes = await supabaseClient.from('items').select('hunger_effect, energy_effect, happiness_effect, xp_effect').eq('id', invRow.data.item_id).single();
      if (itemRes.error || !itemRes.data) { showToast('Could not find item effects.'); return; }
      var ef = itemRes.data;

      var petRes = await supabaseClient.from('user_pets').select('hunger, max_hunger, energy, max_energy, happiness, max_happiness, xp, level').eq('id', petId).single();
      if (petRes.error || !petRes.data) { showToast('Could not find pet.'); return; }
      var pet = petRes.data;

      var updates = {};
      if (ef.hunger_effect > 0) updates.hunger = Math.min(pet.hunger + ef.hunger_effect, pet.max_hunger);
      if (ef.energy_effect > 0) updates.energy = Math.min(pet.energy + ef.energy_effect, pet.max_energy);
      if (ef.happiness_effect > 0) updates.happiness = Math.min(pet.happiness + ef.happiness_effect, pet.max_happiness);
      if (ef.xp_effect > 0) updates.xp = pet.xp + ef.xp_effect;

      if (!Object.keys(updates).length) { showToast('This item has no effects yet.'); return; }

      await supabaseClient.from('user_pets').update(updates).eq('id', petId);

      var qty = invRow.data.quantity;
      if (qty <= 1) { await supabaseClient.from('user_inventory').delete().eq('id', invId); }
      else { await supabaseClient.from('user_inventory').update({quantity: qty - 1}).eq('id', invId); }

      showToast('✨ Used ' + itemName + ' on ' + petNickname + '!');
      await loadInventory();
    }

    init();
  </script>
</body>
</html>
